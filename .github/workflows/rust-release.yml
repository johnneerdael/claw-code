name: Rust Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: rust

jobs:
  release-meta:
    name: Compute release metadata
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      asset_prefix: ${{ steps.meta.outputs.asset_prefix }}
      package_version: ${{ steps.meta.outputs.package_version }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            raw_version="${GITHUB_REF_NAME#v}"
            echo "channel=release" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "asset_prefix=claw-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "package_version=${raw_version}" >> "$GITHUB_OUTPUT"
          else
            package_version="$(date -u +'%Y.%-m%d').${GITHUB_RUN_NUMBER}"
            echo "channel=snapshot" >> "$GITHUB_OUTPUT"
            echo "release_name=main-snapshot" >> "$GITHUB_OUTPUT"
            echo "release_tag=main-snapshot" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "asset_prefix=claw-main-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: cargo test --workspace
    needs: release-meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run workspace tests
        run: cargo test --workspace

  release-macos:
    name: macOS ${{ matrix.target }}
    needs:
      - release-meta
      - test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Build release binary
        run: cargo build --release -p rusty-claude-cli --bin claw --target ${{ matrix.target }}
      - name: Stage payload
        run: |
          python3 scripts/stage_release_payload.py \
            --binary target/${{ matrix.target }}/release/claw \
            --target ${{ matrix.target }} \
            --output dist/${{ matrix.target }}/payload
      - name: Verify payload
        run: python3 scripts/verify_release_payload.py --payload dist/${{ matrix.target }}/payload --target ${{ matrix.target }}
      - name: Build pkg
        id: build_pkg
        run: |
          pkg_path="$(sh packaging/macos/build-pkg.sh \
            --payload dist/${{ matrix.target }}/payload \
            --identifier dev.instructkr.claw \
            --version ${{ needs.release-meta.outputs.package_version }} \
            --output dist/${{ matrix.target }}/${{ needs.release-meta.outputs.asset_prefix }}-${{ matrix.target }}.pkg)"
          echo "pkg_path=$pkg_path" >> "$GITHUB_OUTPUT"
      - name: Inspect pkg
        run: sh packaging/macos/inspect-pkg.sh "${{ steps.build_pkg.outputs.pkg_path }}"
      - name: Create archive and checksum
        run: |
          pkg_path="${{ steps.build_pkg.outputs.pkg_path }}"
          tar -C dist/${{ matrix.target }}/payload -czf dist/${{ matrix.target }}/${{ needs.release-meta.outputs.asset_prefix }}-${{ matrix.target }}.tar.gz .
          shasum -a 256 \
            "$pkg_path" \
            dist/${{ matrix.target }}/${{ needs.release-meta.outputs.asset_prefix }}-${{ matrix.target }}.tar.gz \
            > dist/${{ matrix.target }}/${{ needs.release-meta.outputs.asset_prefix }}-${{ matrix.target }}.sha256
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            rust/dist/${{ matrix.target }}/*.pkg
            rust/dist/${{ matrix.target }}/*.tar.gz
            rust/dist/${{ matrix.target }}/*.sha256

  release-windows:
    name: Windows x86_64-pc-windows-msvc
    needs:
      - release-meta
      - test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME/.dotnet/tools"
      - name: Build release binary
        run: cargo build --release -p rusty-claude-cli --bin claw --target x86_64-pc-windows-msvc
      - name: Stage payload
        shell: pwsh
        run: |
          python scripts/stage_release_payload.py `
            --binary target/x86_64-pc-windows-msvc/release/claw.exe `
            --target x86_64-pc-windows-msvc `
            --output dist/x86_64-pc-windows-msvc/payload
      - name: Verify payload
        shell: pwsh
        run: python scripts/verify_release_payload.py --payload dist/x86_64-pc-windows-msvc/payload --target x86_64-pc-windows-msvc
      - name: Build MSI
        id: build_msi
        shell: pwsh
        run: |
          $msiPath = ./packaging/windows/build-msi.ps1 `
            -PayloadDir dist/x86_64-pc-windows-msvc/payload `
            -Version '${{ needs.release-meta.outputs.package_version }}' `
            -OutFile dist/x86_64-pc-windows-msvc/${{ needs.release-meta.outputs.asset_prefix }}-x86_64-pc-windows-msvc.msi
          "msi_path=$msiPath" >> $env:GITHUB_OUTPUT
      - name: Inspect MSI
        shell: pwsh
        run: ./packaging/windows/inspect-msi.ps1 -MsiPath '${{ steps.build_msi.outputs.msi_path }}'
      - name: Create archive and checksum
        shell: pwsh
        run: |
          $msiPath = '${{ steps.build_msi.outputs.msi_path }}'
          Compress-Archive -Path dist/x86_64-pc-windows-msvc/payload/* -DestinationPath dist/x86_64-pc-windows-msvc/${{ needs.release-meta.outputs.asset_prefix }}-x86_64-pc-windows-msvc.zip -Force
          $pkgHash = (Get-FileHash $msiPath -Algorithm SHA256).Hash.ToLower()
          $zipHash = (Get-FileHash dist/x86_64-pc-windows-msvc/${{ needs.release-meta.outputs.asset_prefix }}-x86_64-pc-windows-msvc.zip -Algorithm SHA256).Hash.ToLower()
          @(
            "$pkgHash  ${{ needs.release-meta.outputs.asset_prefix }}-x86_64-pc-windows-msvc.msi"
            "$zipHash  ${{ needs.release-meta.outputs.asset_prefix }}-x86_64-pc-windows-msvc.zip"
          ) | Set-Content dist/x86_64-pc-windows-msvc/${{ needs.release-meta.outputs.asset_prefix }}-x86_64-pc-windows-msvc.sha256
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64-pc-windows-msvc
          path: |
            rust/dist/x86_64-pc-windows-msvc/*.msi
            rust/dist/x86_64-pc-windows-msvc/*.zip
            rust/dist/x86_64-pc-windows-msvc/*.sha256

  publish:
    name: Publish GitHub Release
    needs:
      - release-meta
      - release-macos
      - release-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Remove previous snapshot assets
        if: needs.release-meta.outputs.channel == 'snapshot'
        uses: mknejp/delete-release-assets@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.release-meta.outputs.release_tag }}
          fail-if-no-assets: false
          fail-if-no-release: false
          assets: "*"
      - name: Publish assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.release_tag }}
          name: ${{ needs.release-meta.outputs.release_name }}
          prerelease: ${{ needs.release-meta.outputs.prerelease }}
          make_latest: ${{ needs.release-meta.outputs.prerelease == 'true' && 'false' || 'true' }}
          files: dist-artifacts/**/*
